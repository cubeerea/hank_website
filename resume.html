<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hank Sha - Resume">
    <title>Resume | Hank Sha</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script type="module" src="/src/theme.ts"></script>
</head>

<body class="font-ui text-base leading-relaxed text-white bg-ink h-full overflow-hidden">
    <!-- Cursor Aura -->
    <div class="cursor-aura fixed top-0 left-0 w-screen h-screen pointer-events-none z-1" id="cursor-aura"></div>

    <div class="flex flex-col h-screen relative z-2">
        <!-- Fixed Header -->
        <header class="fixed top-0 left-0 right-0 z-50 bg-[rgba(10,15,28,0.85)] backdrop-blur-[12px] border-b border-border">
            <div class="max-w-4xl mx-auto px-6 py-3 flex items-center justify-between max-[480px]:px-3 max-[480px]:py-2">
                <div class="flex items-center gap-3">
                    <a href="/"
                        class="text-slate-text flex items-center justify-center w-9 h-9 rounded-lg transition-all duration-200 hover:text-white hover:bg-white/5 hover:no-underline"
                        aria-label="Back to portfolio">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                    </a>
                    <div>
                        <h1 class="font-display text-base font-semibold text-white">Hank Sha</h1>
                        <p class="text-xs text-slate-dim">Resume</p>
                    </div>
                </div>
                <!-- Zoom Controls -->
                <div class="flex items-center gap-2">
                    <button onclick="zoomOut()"
                        class="flex items-center justify-center w-9 h-9 rounded-lg bg-white/5 border border-border text-slate-text cursor-pointer transition-all duration-200 hover:text-white hover:border-border-hover hover:bg-white/[0.08] font-inherit"
                        aria-label="Zoom out">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4" />
                        </svg>
                    </button>
                    <span id="zoomLevel" class="text-[0.8rem] font-medium text-slate-text min-w-12 text-center font-ui">200%</span>
                    <button onclick="zoomIn()"
                        class="flex items-center justify-center w-9 h-9 rounded-lg bg-white/5 border border-border text-slate-text cursor-pointer transition-all duration-200 hover:text-white hover:border-border-hover hover:bg-white/[0.08] font-inherit"
                        aria-label="Zoom in">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- PDF Viewport -->
        <main class="flex-1 overflow-auto pt-16">
            <div class="min-h-full flex flex-col items-center justify-start p-6 pt-6 max-[480px]:p-2 max-[480px]:pt-4">
                <!-- Loading State -->
                <div id="loadingState" class="flex flex-col items-center justify-center py-20">
                    <div class="spinner w-10 h-10 border-2 border-border border-t-cyan rounded-full mb-4"></div>
                    <p class="text-sm text-slate-dim">Loading resume...</p>
                </div>

                <!-- Error State -->
                <div id="errorState" class="hidden flex-col items-center justify-center py-20 text-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="text-slate-dim mb-4" width="48" height="48"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <p class="font-display text-lg font-semibold text-white mb-2">Unable to load resume</p>
                    <p class="text-sm text-slate-dim mb-6">The PDF file could not be loaded.</p>
                    <a href="/assets/hank_sha_resume.pdf" download="hank_sha_resume.pdf"
                        class="inline-block px-4 py-2 rounded-xl text-sm font-medium no-underline border border-cyan-dim text-white shadow-[0_10px_40px_-10px_var(--color-cyan-glow)] transition-all duration-200 hover:border-cyan hover:shadow-[0_10px_50px_-10px_var(--color-cyan-glow)] hover:no-underline">
                        Download PDF
                    </a>
                </div>

                <!-- PDF Canvas Container -->
                <div id="canvasContainer" class="hidden flex-col items-center [&.is-visible]:flex">
                    <canvas id="pdfCanvas" class="rounded border border-border shadow-[0_20px_60px_-15px_rgba(0,0,0,0.5)]"></canvas>
                </div>
            </div>
        </main>
    </div>

    <!-- Floating Download Button -->
    <a href="/assets/hank_sha_resume.pdf" download="hank_sha_resume.pdf"
        class="fixed bottom-6 right-6 z-50 flex items-center justify-center w-14 h-14 rounded-full border border-cyan-dim bg-ink-card text-cyan shadow-[0_10px_40px_-10px_var(--color-cyan-glow)] transition-all duration-200 hover:border-cyan hover:shadow-[0_10px_50px_-10px_var(--color-cyan-glow)] hover:scale-105 hover:no-underline active:scale-95 max-[480px]:w-12 max-[480px]:h-12 max-[480px]:bottom-4 max-[480px]:right-4"
        aria-label="Download resume">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
    </a>

    <script type="module" src="/src/resume.ts"></script>
</body>

</html>
