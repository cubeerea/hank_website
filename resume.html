<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hank Sha - Resume">
    <title>Resume | Hank Sha</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Resume page overrides */
        html, body {
            height: 100%;
            overflow: hidden;
        }

        .resume-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
            z-index: 2;
        }

        /* Fixed Header */
        .resume-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            background: rgba(10, 15, 28, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .resume-header__inner {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .resume-header__left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .resume-header__back {
            color: var(--slate);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 0.5rem;
            transition: color 0.2s ease, background 0.2s ease;
        }

        .resume-header__back:hover {
            color: var(--white);
            background: rgba(255, 255, 255, 0.05);
            text-decoration: none;
        }

        .resume-header__title {
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 600;
            color: var(--white);
        }

        .resume-header__subtitle {
            font-size: 0.75rem;
            color: var(--slate-dim);
        }

        /* Zoom Controls */
        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .zoom-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--slate);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .zoom-btn:hover {
            color: var(--white);
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.08);
        }

        .zoom-level {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--slate);
            min-width: 3rem;
            text-align: center;
            font-family: var(--font-ui);
        }

        /* PDF Viewport */
        .resume-viewport {
            flex: 1;
            overflow: auto;
            padding-top: 4rem;
        }

        .resume-viewport__inner {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 1.5rem 1rem;
        }

        /* Loading State */
        .resume-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 0;
        }

        .resume-loading__spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .resume-loading__text {
            font-size: 0.875rem;
            color: var(--slate-dim);
        }

        /* Error State */
        .resume-error {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 0;
            text-align: center;
        }

        .resume-error__icon {
            color: var(--slate-dim);
            margin-bottom: 1rem;
        }

        .resume-error__title {
            font-family: var(--font-display);
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--white);
            margin-bottom: 0.5rem;
        }

        .resume-error__text {
            font-size: 0.875rem;
            color: var(--slate-dim);
            margin-bottom: 1.5rem;
        }

        /* Canvas Container */
        .resume-canvas-wrap {
            display: none;
        }

        .resume-canvas-wrap.is-visible {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #pdfCanvas {
            border-radius: 4px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.5);
        }

        /* Download FAB */
        .resume-fab {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 1px solid var(--cyan-dim);
            background: var(--ink-card);
            color: var(--cyan);
            box-shadow: 0 10px 40px -10px var(--cyan-glow);
            transition: all 0.2s ease;
        }

        .resume-fab:hover {
            border-color: var(--cyan);
            box-shadow: 0 10px 50px -10px var(--cyan-glow);
            transform: scale(1.05);
            text-decoration: none;
        }

        .resume-fab:active {
            transform: scale(0.95);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .resume-header__inner {
                padding: 0.5rem 0.75rem;
            }

            .resume-viewport__inner {
                padding: 1rem 0.5rem;
            }

            .resume-fab {
                width: 48px;
                height: 48px;
                bottom: 1rem;
                right: 1rem;
            }
        }
    </style>
</head>

<body>
    <!-- Cursor Aura -->
    <div class="cursor-aura" id="cursor-aura"></div>

    <div class="resume-layout">
        <!-- Fixed Header -->
        <header class="resume-header">
            <div class="resume-header__inner">
                <div class="resume-header__left">
                    <a href="/" class="resume-header__back" aria-label="Back to portfolio">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                    </a>
                    <div>
                        <h1 class="resume-header__title">Hank Sha</h1>
                        <p class="resume-header__subtitle">Resume</p>
                    </div>
                </div>
                <!-- Zoom Controls -->
                <div class="zoom-controls">
                    <button onclick="zoomOut()" class="zoom-btn" aria-label="Zoom out">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4" />
                        </svg>
                    </button>
                    <span id="zoomLevel" class="zoom-level">200%</span>
                    <button onclick="zoomIn()" class="zoom-btn" aria-label="Zoom in">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- PDF Viewport -->
        <main class="resume-viewport">
            <div class="resume-viewport__inner">
                <!-- Loading State -->
                <div id="loadingState" class="resume-loading">
                    <div class="resume-loading__spinner"></div>
                    <p class="resume-loading__text">Loading resume...</p>
                </div>

                <!-- Error State -->
                <div id="errorState" class="resume-error">
                    <svg xmlns="http://www.w3.org/2000/svg" class="resume-error__icon" width="48" height="48"
                        fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    <p class="resume-error__title">Unable to load resume</p>
                    <p class="resume-error__text">The PDF file could not be loaded.</p>
                    <a href="/assets/hank_sha_resume.pdf" download="hank_sha_resume.pdf" class="btn btn--primary">
                        Download PDF
                    </a>
                </div>

                <!-- PDF Canvas Container -->
                <div id="canvasContainer" class="resume-canvas-wrap">
                    <canvas id="pdfCanvas"></canvas>
                </div>
            </div>
        </main>
    </div>

    <!-- Floating Download Button -->
    <a href="/assets/hank_sha_resume.pdf" download="hank_sha_resume.pdf" class="resume-fab"
        aria-label="Download resume">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
    </a>

    <script>
        // Cursor Aura
        (function () {
            const aura = document.getElementById('cursor-aura');
            if (!aura) return;
            window.addEventListener('mousemove', (e) => {
                aura.style.setProperty('--x', `${e.clientX}px`);
                aura.style.setProperty('--y', `${e.clientY}px`);
            });
        })();

        // PDF.js Configuration
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // State
        let pdfDoc = null;
        let scale = 2.0;
        const minScale = 0.5;
        const maxScale = 3.0;
        const scaleStep = 0.25;

        // DOM Elements
        const canvas = document.getElementById('pdfCanvas');
        const ctx = canvas.getContext('2d');
        const loadingState = document.getElementById('loadingState');
        const errorState = document.getElementById('errorState');
        const canvasContainer = document.getElementById('canvasContainer');
        const zoomLevelDisplay = document.getElementById('zoomLevel');

        // Load PDF
        async function loadPDF() {
            try {
                pdfDoc = await pdfjsLib.getDocument('/assets/hank_sha_resume.pdf').promise;
                loadingState.style.display = 'none';
                canvasContainer.classList.add('is-visible');
                renderPage();
            } catch (error) {
                console.error('Error loading PDF:', error);
                loadingState.style.display = 'none';
                errorState.style.display = 'flex';
            }
        }

        // Render PDF Page
        async function renderPage() {
            if (!pdfDoc) return;

            const page = await pdfDoc.getPage(1);
            const viewport = page.getViewport({ scale: scale * window.devicePixelRatio });

            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = `${viewport.width / window.devicePixelRatio}px`;
            canvas.style.height = `${viewport.height / window.devicePixelRatio}px`;

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            updateZoomDisplay();
        }

        // Zoom Functions
        function zoomIn() {
            if (scale < maxScale) {
                scale = Math.min(scale + scaleStep, maxScale);
                renderPage();
            }
        }

        function zoomOut() {
            if (scale > minScale) {
                scale = Math.max(scale - scaleStep, minScale);
                renderPage();
            }
        }

        function updateZoomDisplay() {
            zoomLevelDisplay.textContent = `${Math.round(scale * 100)}%`;
        }

        // Handle window resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (pdfDoc) renderPage();
            }, 150);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '+' || e.key === '=') {
                e.preventDefault();
                zoomIn();
            } else if (e.key === '-') {
                e.preventDefault();
                zoomOut();
            }
        });

        // Initialize
        loadPDF();
    </script>
</body>

</html>
